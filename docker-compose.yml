version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ims
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: ims-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: ims-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_DB: ims
      PG_USER: ims_user
      PG_PASS: ims_pass
      MONGO_URI: mongodb://mongodb:27017/ims_signals
      REDIS_HOST: redis
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: ims-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  redis_data:
